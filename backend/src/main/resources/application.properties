spring.application.name=frontoffice

# ==================== DATABASE ====================
# createDatabaseIfNotExist = crea il DB 'healthrad' se non esiste
# useSSL=false + allowPublicKeyRetrieval=true = compatibilità con MySQL locale senza certificati
# serverTimezone=Europe/Rome = timezone corretto per Italy
spring.datasource.url=jdbc:mysql://localhost:3306/healthrad?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Rome
spring.datasource.username=root
spring.datasource.password=2352
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JPA / HIBERNATE ====================
# ddl-auto=none: usiamo il nostro schema.sql manuale (non auto-generate)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==================== INIZIALIZZAZIONE SQL ====================
# Spring Boot esegue schema.sql poi data.sql ad ogni avvio
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# ==================== SICUREZZA JWT (placeholder) ====================
jwt.expiration-ms=3600000

# ==================== FILE STORAGE SICURO ====================
storage.consensi.dir=./storage/consensi
