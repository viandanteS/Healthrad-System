<!-- Shell: Navbar orizzontale + contenuto -->
<div class="min-h-screen bg-white flex flex-col">

  <!-- === TOPBAR === -->
  <header class="border-b border-gray-300">
    <!-- Riga 1: ruolo utente -->
    <div class="flex justify-end px-8 py-1.5 bg-white">
      <span class="text-xs font-semibold text-gray-600 tracking-wide">{{ ruoloUtente }}</span>
    </div>

    <!-- Riga 2: logo + navigazione -->
    <div class="flex items-center justify-between px-8 py-3">
      <!-- Logo -->
      <a routerLink="/dashboard" class="cursor-pointer">
        <img src="assets/logo.png" alt="HealthRAD" class="h-24 object-contain" />
      </a>

      <!-- Bottoni di navigazione -->
      <nav class="flex items-center gap-3">
        <a *appHasRole="['Addetto al Front-Office']" routerLink="/anagrafica"
          routerLinkActive="bg-health-primary text-white"
          class="px-6 py-2.5 rounded-full border-2 border-health-primary text-health-primary font-bold text-sm font-sans tracking-wide hover:bg-health-primary hover:text-white transition-all text-center whitespace-nowrap">
          Anagrafica clienti
        </a>
        <a *appHasRole="['Addetto al Front-Office']" routerLink="/appuntamenti"
          routerLinkActive="bg-health-primary text-white"
          class="px-6 py-2.5 rounded-full border-2 border-health-primary text-health-primary font-bold text-sm font-sans tracking-wide hover:bg-health-primary hover:text-white transition-all text-center whitespace-nowrap">
          Gestione appuntamenti
        </a>
        <button (click)="logout()"
          class="px-6 py-2.5 rounded-full border-2 border-red-400 text-red-500 font-bold text-sm font-sans tracking-wide hover:bg-red-500 hover:text-white transition-all ml-4">
          Esci
        </button>
      </nav>
    </div>
    <div class="border-t-2 border-black mx-0"></div>
  </header>

  <!-- === CONTENUTO === -->
  <main class="flex-1">
    <router-outlet></router-outlet>
  </main>

</div>
